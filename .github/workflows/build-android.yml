name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soccer-scoreboard-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk soccer-scoreboard.apk
          gh release delete android-latest --yes 2>/dev/null || true
          git push origin :refs/tags/android-latest 2>/dev/null || true
          gh release create android-latest \
            --title "Android – Latest Build" \
            --notes "Latest Android APK. Enable *Install from unknown sources* on your phone, then download and tap to install." \
            --latest=false \
            "soccer-scoreboard.apk"
