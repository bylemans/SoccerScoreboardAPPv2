name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        run: cd ios/App && pod install

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ runner.temp }}/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package as IPA
        run: |
          mkdir -p "${{ runner.temp }}/Payload"
          cp -r "${{ runner.temp }}/App.xcarchive/Products/Applications/App.app" \
            "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -r SoccerScoreboard.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: soccer-scoreboard-ios
          path: ${{ runner.temp }}/SoccerScoreboard.ipa
          retention-days: 30
